<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Coupling principle feedback loop</title>
<desc>How the coupling principle connects to surface expansion, sprawl diagnosis, and review v-cycle operators in a closed feedback loop.</desc>
<style>
  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="210" y="30" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Coupling principle</text>
<text class="ts" x="340" y="66" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Prose + formal grow as a pair</text>

<text class="ts" x="354" y="104" text-anchor="start" fill="#5F5E5A">violated</text>
<line x1="340" y1="86" x2="340" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="120" width="260" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#712B13">Surface expansion</text>
<text class="ts" x="340" y="156" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Uncoupled growth detected</text>

<text class="ts" x="354" y="194" text-anchor="start" fill="#5F5E5A">manifests as</text>
<line x1="340" y1="176" x2="340" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="100" y="210" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="180" y="228" text-anchor="middle" dominant-baseline="central" fill="#712B13">Prose sprawl</text>
<text class="ts" x="180" y="246" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Too much prose</text>

<rect x="280" y="210" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="360" y="228" text-anchor="middle" dominant-baseline="central" fill="#712B13">Contract sprawl</text>
<text class="ts" x="360" y="246" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Too much formal</text>

<rect x="460" y="210" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="540" y="228" text-anchor="middle" dominant-baseline="central" fill="#712B13">Index sprawl</text>
<text class="ts" x="540" y="246" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Enumerations grow</text>

<line x1="260" y1="238" x2="278" y2="238" stroke="#888780" stroke-width="1.5"/>
<line x1="440" y1="238" x2="458" y2="238" stroke="#888780" stroke-width="1.5"/>

<text class="ts" x="354" y="284" text-anchor="start" fill="#5F5E5A">diagnosed by</text>
<line x1="340" y1="266" x2="340" y2="300" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="300" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="#085041">Delta from target</text>
<text class="ts" x="340" y="336" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">70/30 for claim files</text>

<text class="ts" x="354" y="374" text-anchor="start" fill="#5F5E5A">calibrates</text>
<line x1="340" y1="356" x2="340" y2="390" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="390" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="408" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Review V-Cycle</text>
<text class="ts" x="340" y="426" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Prompts enforce coupling</text>

<path d="M210 418 L80 418 L80 58 L208 58" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="68" y="240" text-anchor="middle" fill="#5F5E5A" transform="rotate(-90 68 240)">enforces</text>

</svg>
