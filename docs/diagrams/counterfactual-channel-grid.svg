<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Counterfactual channel configuration grid</title>
<desc>A two-by-two matrix with theory channel shape on the vertical axis and data channel shape on the horizontal axis, showing four configurations and their synthesis outcomes</desc>

<!-- Axis: Data channel (top) -->
<text x="400" y="24" text-anchor="middle" fill="#6b6b6b" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Data channel</text>
<text x="272" y="52" text-anchor="middle" fill="#1a1a1a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">nouns</text>
<text x="524" y="52" text-anchor="middle" fill="#1a1a1a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">verbs</text>

<!-- Axis: Theory channel (left) -->
<text x="76" y="100" text-anchor="middle" fill="#6b6b6b" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Theory</text>
<text x="76" y="114" text-anchor="middle" fill="#6b6b6b" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">channel</text>
<text x="120" y="150" text-anchor="end" fill="#1a1a1a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">nouns</text>
<text x="120" y="300" text-anchor="end" fill="#1a1a1a" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">verbs</text>

<!-- Cell: nouns × nouns — both descriptive -->
<rect x="148" y="68" width="248" height="148" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="272" y="118" text-anchor="middle" dominant-baseline="central" fill="#444441" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">Both descriptive</text>
<text x="272" y="142" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">No pressure to build algebra</text>
<text x="272" y="178" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Reasoning stays prose</text>

<!-- Cell: nouns × verbs — observed sweet spot -->
<rect x="404" y="68" width="248" height="148" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="528" y="110" text-anchor="middle" dominant-baseline="central" fill="#085041" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">Asymmetric</text>
<text x="528" y="134" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Forces algebra coinage</text>
<text x="528" y="178" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Observed in Xanadu</text>

<!-- Cell: verbs × nouns — inverted -->
<rect x="148" y="224" width="248" height="148" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="272" y="274" text-anchor="middle" dominant-baseline="central" fill="#712B13" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">Inverted</text>
<text x="272" y="298" text-anchor="middle" dominant-baseline="central" fill="#993C1D" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Synthesis validates, not constructs</text>
<text x="272" y="334" text-anchor="middle" dominant-baseline="central" fill="#993C1D" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Coinage only at frontier</text>

<!-- Cell: verbs × verbs — both algebraic -->
<rect x="404" y="224" width="248" height="148" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="528" y="266" text-anchor="middle" dominant-baseline="central" fill="#633806" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="500">Both algebraic</text>
<text x="528" y="290" text-anchor="middle" dominant-baseline="central" fill="#854F0B" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">Reduces to symbol-matching</text>
<text x="528" y="326" text-anchor="middle" dominant-baseline="central" fill="#854F0B" opacity="0.6" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">May hide assumptions</text>

<!-- Diagonal annotation -->
<line x1="148" y1="68" x2="396" y2="216" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.15"/>
<line x1="404" y1="224" x2="652" y2="372" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.15"/>
<text x="400" y="405" text-anchor="middle" fill="#6b6b6b" opacity="0.4" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12">diagonal = matched shapes (degenerate)</text>

</svg>
