<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Lattice lifecycle: three transitions and visibility rules</title>
<desc>Diagram showing how a note progresses through blueprint, promote, and assemble transitions, and how discovery-stage and formalization-stage consumers see the note differently at each stage.</desc>
<style>
  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title area -->
<text class="th" x="340" y="30" text-anchor="middle" fill="#2C2C2A">Note lifecycle: three transitions</text>
<text class="ts" x="340" y="48" text-anchor="middle" fill="#5F5E5A">Each gate controls what consumers can see</text>

<!-- === Row 1: Discovery state === -->
<rect x="40" y="72" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="140" y="94" text-anchor="middle" dominant-baseline="central" fill="#712B13">Discovery</text>
<text class="ts" x="140" y="112" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Undecomposed note</text>
<text class="ts" x="270" y="94" text-anchor="start" fill="#5F5E5A">Claims embedded in prose.</text>
<text class="ts" x="270" y="112" text-anchor="start" fill="#5F5E5A">Not yet decomposed.</text>

<!-- Arrow down to Blueprint -->
<line x1="140" y1="128" x2="140" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gate 1: Blueprint -->
<rect x="60" y="160" width="160" height="36" rx="18" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="140" y="178" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Blueprint</text>

<!-- Arrow down -->
<line x1="140" y1="196" x2="140" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- === Row 2: Blueprinted state === -->
<rect x="40" y="220" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="140" y="242" text-anchor="middle" dominant-baseline="central" fill="#712B13">Blueprinted</text>
<text class="ts" x="140" y="260" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Claims exist, not visible</text>
<text class="ts" x="270" y="242" text-anchor="start" fill="#5F5E5A">Claims decomposed into files.</text>
<text class="ts" x="270" y="260" text-anchor="start" fill="#5F5E5A">Not yet referenceable.</text>

<!-- Arrow down to Promote -->
<line x1="140" y1="276" x2="140" y2="308" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gate 2: Promote -->
<rect x="60" y="308" width="160" height="36" rx="18" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="140" y="326" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Promote</text>

<!-- Arrow down -->
<line x1="140" y1="344" x2="140" y2="368" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- === Row 3: Promoted state === -->
<rect x="40" y="368" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="140" y="390" text-anchor="middle" dominant-baseline="central" fill="#085041">Promoted</text>
<text class="ts" x="140" y="408" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Claims referenceable</text>
<text class="ts" x="270" y="390" text-anchor="start" fill="#5F5E5A">Formalization consumers</text>
<text class="ts" x="270" y="408" text-anchor="start" fill="#5F5E5A">can now use follows_from.</text>

<!-- Arrow down to Assemble -->
<line x1="140" y1="424" x2="140" y2="456" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gate 3: Assemble -->
<rect x="60" y="456" width="160" height="36" rx="18" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="140" y="474" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Assemble</text>

<!-- Arrow down -->
<line x1="140" y1="492" x2="140" y2="516" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- === Row 4: Assembled state === -->
<rect x="40" y="516" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="140" y="538" text-anchor="middle" dominant-baseline="central" fill="#085041">Assembled</text>
<text class="ts" x="270" y="532" text-anchor="start" fill="#5F5E5A">Discovery consumers</text>
<text class="ts" x="270" y="550" text-anchor="start" fill="#5F5E5A">now see updated note.</text>

<!-- === Right side: Consumer visibility === -->
<!-- Discovery consumer -->
<rect x="530" y="316" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="595" y="338" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Discovery</text>
<text class="ts" x="595" y="356" text-anchor="middle" dominant-baseline="central" fill="#185FA5">consumer</text>
<text class="ts" x="595" y="388" text-anchor="middle" fill="#5F5E5A">Sees assembled note</text>

<!-- Dashed line from assembled to discovery consumer -->
<line x1="240" y1="538" x2="490" y2="538" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="490" y1="538" x2="490" y2="372" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="490" y1="344" x2="528" y2="344" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Formalization consumer -->
<rect x="530" y="430" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="595" y="452" text-anchor="middle" dominant-baseline="central" fill="#633806">Formalization</text>
<text class="ts" x="595" y="470" text-anchor="middle" dominant-baseline="central" fill="#854F0B">consumer</text>
<text class="ts" x="595" y="502" text-anchor="middle" fill="#5F5E5A">Sees claim set</text>

<!-- Dashed line from promoted to formalization consumer -->
<line x1="240" y1="396" x2="460" y2="396" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="460" y1="396" x2="460" y2="458" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="460" y1="458" x2="528" y2="458" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>

</svg>
