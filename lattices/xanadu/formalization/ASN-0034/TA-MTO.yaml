label: TA-MTO
name: ManyToOne
type: lemma
summary: 'Two tumblers a and b yield the same result under displacement w if and only if they agree on every component from
  position 1 through w''s action point. This is TumblerAdd''s many-to-one property made precise: components of the starting
  position beyond the action point are overwritten by the displacement''s tail and cannot influence or be recovered from the
  result.'
