label: NAT-zero
name: NatZeroMinimum
type: axiom
depends:
  - NAT-order
summary: |
  Fixes 0 as the minimum of ℕ via the pair `0 ∈ ℕ` and `(A n ∈ ℕ :: 0 < n ∨ 0 = n)`,
  together with the exported *Consequence:* `(A n ∈ ℕ :: ¬(n < 0))`. The consequence
  bullet is not delivered by the axiom body alone; it is lifted from the disjunction
  by NAT-order's irreflexivity `¬(n < n)`, transitivity `m < n ∧ n < p ⟹ m < p`,
  and disjointness of `<` and `=` — `(A m, n ∈ ℕ : m < n : m ≠ n)` — which
  excludes the `0 = n` branch without substituting equals under `<`; NAT-order is
  declared in Depends. Supplies `0 ∈ ℕ` for zero-padded components and literal-zero
  sites across the ASN, and the disjunction `0 < n ∨ 0 = n` — combined with `n ≠ 0`
  to rule out the equality case — to instantiate NAT-discrete at `m = 0` and derive
  the inference `n ≠ 0 ⟹ n ≥ 1`.
