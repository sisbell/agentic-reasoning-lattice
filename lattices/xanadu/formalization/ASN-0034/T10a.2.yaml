label: T10a.2
name: NonNestingSiblingPrefixes
type: corollary
depends:
- Prefix
- T10a
- T10a.1
- T3
summary: Distinct outputs of a single allocator are prefix-incomparable — neither sibling is a prefix of the other. Because
  T10a.1 guarantees all siblings share the same length, a prefix relation between distinct siblings would require unequal
  lengths, yielding a contradiction; the result supplies the within-allocator non-nesting condition that T10 requires.
