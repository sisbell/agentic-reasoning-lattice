label: T0
name: CarrierSetDefinition
type: axiom
depends: []
summary: |
  Posits the carrier set T as the set of all finite sequences of natural numbers with at least
  one component, and introduces the length operator (#) and component projection (aᵢ) as
  primitives. Commits that for each a ∈ T the component projection's index domain {1, …, #a}
  is a subset of ℕ, so bounded quantifiers of the form `1 ≤ i ≤ #a` are well-formed over ℕ.
  This is an axiom, not a derivation — it establishes the raw material from which every other
  property in the system is built.
