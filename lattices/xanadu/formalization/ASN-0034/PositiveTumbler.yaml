label: TA-Pos
name: PositiveTumbler
type: definition
depends:
- T0
- T1
summary: |
  Defines positivity for tumblers via two predicate symbols: `Pos(t)` (positive) iff at least one component is
  nonzero, and `Zero(t)` (zero tumbler) iff every component is zero. Additionally introduces the set-form
  `Z = {t ∈ T : Zero(t)}`, consumed by TA7a's subspace-closure postcondition `o ⊖ w ∈ S ∪ Z` where the union
  with `S` requires set-valued notation. The ordering consequence — every positive tumbler is strictly greater
  under T1 than every zero tumbler of any length — is established separately by a downstream ordering theorem
  that consumes ActionPoint.
