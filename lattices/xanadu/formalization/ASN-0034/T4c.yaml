label: T4c
name: LevelDetermination
type: corollary
depends:
- T0
- T4
- NAT-zero
- NAT-discrete
- NAT-order
- NAT-closure
- NAT-addcompat
- NAT-card
summary: |
  On the T4-valid subset of T (tumblers satisfying zeros(t) ≤ 3, no two zeros adjacent,
  t₁ ≠ 0, t_{#t} ≠ 0), T4c defines the four hierarchical level labels — node address,
  user address, document address, element address — by zero count: zeros(t) = 0 ↔
  node address, zeros(t) = 1 ↔ user address, zeros(t) = 2 ↔ document address,
  zeros(t) = 3 ↔ element address. The biconditionals are definitional — they assign
  labels to zero-count values rather than bridging two independently characterised
  notions. NAT-card axiomatizes the cardinality operator |·| on subsets of every
  initial segment {1, …, n} ⊆ ℕ with codomain ℕ, grounding zeros(t) ∈ ℕ for the
  definition zeros(t) = |{i : 1 ≤ i ≤ #t ∧ tᵢ = 0}| (the zero-index subset lies in
  {1, …, #t}). NAT-closure posits 1 ∈ ℕ and closes ℕ under addition, grounding the
  numerals 2 := 1 + 1 ∈ ℕ and 3 := 2 + 1 ∈ ℕ used in both exhaustion's bound
  zeros(t) ≤ 3 and injectivity's chain 0 < 1 < 2 < 3. T4's bound
  zeros(t) ≤ 3, NAT-zero's 0 ≤ zeros(t), NAT-order's trichotomy (case-splitting
  zeros(t) against each m ∈ {0, 1, 2, 3} into zeros(t) < m, zeros(t) = m, or
  m < zeros(t), with the first branch excluded at each step by trichotomy's
  exactly-one clause — the cumulative lower bound m ≤ zeros(t) unfolds to
  m < zeros(t) ∨ m = zeros(t), so one of the other two trichotomy alternatives
  holds and the third is forbidden, without appeal to transitivity, irreflexivity,
  or substitution of equals under <), and NAT-discrete (promoting
  m < zeros(t) to m + 1 ≤ zeros(t)) together supply exhaustion on
  the T4-valid subdomain (every T4-valid tumbler receives a label);
  the four labels are pairwise distinct because the zero counts 0, 1, 2, 3 are
  pairwise distinct in ℕ — NAT-addcompat's strict successor inequality n < n + 1
  (at n = 0, 1, 2) supplies 0 < 1, 1 < 2, 2 < 3, NAT-order transitivity chains
  these to 0 < 1 < 2 < 3, and NAT-order irreflexivity excludes equality within
  the chain — and zeros(t) is single-valued. T4c does not claim realisation:
  existence of a T4-valid tumbler at each zero count is not underwritten by
  the foundations in scope, so T4c stands as a pure definition on whatever
  T4-valid tumblers exist. The claim is universally quantified
  over the T4-valid subdomain and assigns no level outside it. No dependency on
  T4b is required because the labels are defined by T4c directly in terms of zero
  count, not in terms of T4b's fields(t) decomposition; a downstream reading that
  characterises levels by the presence or absence of particular field segments
  would require T4b and is not the content of T4c.
