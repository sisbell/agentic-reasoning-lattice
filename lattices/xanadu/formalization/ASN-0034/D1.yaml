summary: 'Proves the displacement round-trip identity: when a < b, the divergence point does not exceed a''s length, and a
  is no longer than b, then a ⊕ (b ⊖ a) = b exactly. This is the affirmative half of D0''s conditional — the length constraint
  #a ≤ #b is the precise condition that closes the round-trip.'
