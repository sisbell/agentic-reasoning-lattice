label: NAT-sub
name: NatPartialSubtraction
type: axiom
depends:
- NAT-closure
- NAT-order
summary: |
  Subtraction on ℕ is a partial binary operation defined when the minuend is at least
  the subtrahend. The difference `m − n` is the unique natural number satisfying
  `(m − n) + n = m` (equivalently `n + (m − n) = m`); strict minuend yields strict
  positivity (`m > n ⟹ m − n ≥ 1`); telescoping `(m + n) − n = m` and strict
  monotonicity `m < n ∧ m ≥ p ∧ n ≥ p ⟹ m − p < n − p` are bundled as additional
  clauses so the per-step citation convention covers every subtraction step that
  TumblerSub, TA2, TA3, TA3-strict, TA4, TA7a, ReverseInverse, D0, D1, and D2
  invoke at a divergence point or round-trip.
