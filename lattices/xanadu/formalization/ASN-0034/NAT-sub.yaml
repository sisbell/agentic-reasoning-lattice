label: NAT-sub
name: NatPartialSubtraction
type: axiom
depends:
- NAT-closure
- NAT-order
- NAT-addbound
- NAT-addcompat
- NAT-zero
- NAT-discrete
summary: |
  Subtraction on ℕ is a partial binary operation defined when the minuend is at least
  the subtrahend. The difference `m − n` is the unique natural number satisfying
  `(m − n) + n = m` (equivalently `n + (m − n) = m`); right telescoping
  `(m + n) − n = m` is bundled as an additional axiom clause. Strict monotonicity
  `m ≥ p ∧ n ≥ p ∧ m < n ⟹ m − p < n − p` is exported as a Consequence rather than
  an axiom clause, since it derives from the right-inverse together with
  NAT-addcompat's right order compatibility and NAT-order's at-least-one trichotomy
  with irreflexivity; retaining it as an axiom would launder the derivation through
  a non-minimal clause. Strict positivity `m > n ⟹ m − n ≥ 1` is likewise exported
  as a Consequence, since lifting `m − n ≠ 0` to `m − n ≥ 1` leans on NAT-discrete's
  discreteness of ℕ — a structural commitment beyond subtraction-structure alone.
  The per-step citation convention covers every subtraction step that TumblerSub,
  TA2, TA3, TA3-strict, TA4, TA7a, ReverseInverse, D0, D1, and D2 invoke at a
  divergence point or round-trip.
