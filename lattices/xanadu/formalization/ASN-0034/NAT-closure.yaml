label: NAT-closure
name: NatArithmeticClosureAndIdentity
type: axiom
depends:
  - NAT-zero
summary: |
  Posits the binary operation `+ : ℕ × ℕ → ℕ` directly on ℕ (not derived from
  any earlier axiom), asserts `1 ∈ ℕ`, and fixes `0` as the left additive
  identity (`0 + n = n`). Closure of ℕ under addition is carried by the
  signature's codomain commitment, not listed as a separate clause. Successor
  closure `n + 1 ∈ ℕ` is the instance of that commitment at `(n, 1)` rather
  than a separate axiom. The right-identity form `n + 0 = n` is not
  axiomatized; commutativity of `+` is not enumerated, so the mirrored clause
  is not derivable from this axiom alone.
