label: NAT-closure
name: NatArithmeticClosureAndIdentity
type: axiom
depends: []
summary: |
  Posits `1 ∈ ℕ`, closes ℕ under successor (`n + 1 ∈ ℕ`) and binary addition
  (`m + n ∈ ℕ`), and fixes `0` as the left additive identity (`0 + n = n`).
  The right-identity form `n + 0 = n` is not axiomatized; commutativity of `+`
  is not enumerated, so the mirrored clause is not derivable from this axiom
  alone.
