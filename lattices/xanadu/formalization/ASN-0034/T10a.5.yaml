label: T10a.5
name: CrossAllocatorIncomparability
summary: 'Any two allocators that are not in an ancestor-descendant relationship produce mutually prefix-incomparable outputs
  — no output of one can be a prefix of any output of the other. The argument traces to the lowest common ancestor: the two
  spawning paths diverge at sibling outputs of that ancestor, and length separation (T10a.3) together with T4-based component
  analysis (TA5-SigValid) shows the divergence is irreconcilable. This alone delivers T10''s non-nesting precondition at the
  domain prefixes of every non-ancestor-descendant allocator pair, disjoint from T10a.2''s within-allocator guarantee.'
