label: T9
name: ForwardAllocation
type: lemma
depends:
- T1
- T8
- T10a
- T10a.6
- T10a.7
- TA5
summary: When two addresses are produced by the same allocator and one is allocated before the other, the earlier-allocated
  address is strictly smaller under the tumbler total order. Well-definedness of "allocated before" requires domain disjointness
  across allocators and index injectivity within a single allocator; the strict ordering itself follows from the monotonicity
  of the increment operation and transitivity of the total order.
