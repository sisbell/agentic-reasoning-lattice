label: T4b
name: UniqueParse
type: corollary
depends:
- T0
- T4
- T4a
- NAT-zero
- NAT-discrete
- NAT-order
- NAT-closure
- NAT-sub
- NAT-card
summary: |
  fields : T ⇀ Seq(ℕ⁺) × Seq(ℕ⁺) × Seq(ℕ⁺) × Seq(ℕ⁺) is a partial function whose domain
  is exactly the T4-valid subset of T (at most three zeros, no two adjacent, t₁ ≠ 0,
  t_{#t} ≠ 0). Seq(X) denotes the set of finite, possibly empty sequences over X, with ε
  for the unique zero-length sequence; this differs from T0's T (which fixes #a ≥ 1 for
  every a ∈ T) only by adjoining ε, so the codomain accommodates the absence marker. On
  that subdomain it returns (N(t), U(t), D(t), E(t)) with absent fields represented by ε.
  Field absence is defined directly in terms of zeros(t) — N is never absent on the
  T4-valid subdomain; U is absent iff zeros(t) = 0; D is absent iff zeros(t) ≤ 1;
  E is absent iff zeros(t) ≤ 2 — and the biconditional X(t) = ε iff X is absent in t
  is discharged by inspection of the case construction on zeros(t).
  The absence pattern is fixed by zeros(t) ∈ {0, 1, 2, 3}, and the component-access
  notation t.X₁ := (X(t))₁ is grounded in T0's subscript: ℕ⁺ ⊆ ℕ embeds every nonempty
  element of Seq(ℕ⁺) into T, so T0's projection applies to X(t) whenever X(t) ≠ ε. Hence
  t.X₁ is defined iff X(t) ≠ ε — in particular t.E₁ requires zeros(t) = 3. T4a's reverse
  direction supplies, from T4's field-segment constraint, the conclusion that every field
  segment is non-empty; T4b locally re-expresses this as the segment-length inequalities
  (s₁ ≥ 2, s_k ≤ #t − 1, s_{j+1} ≥ s_j + 2) that discharge non-emptiness of every listed
  sub-sequence. NAT-closure grounds the numeral 2 := 1 + 1 in ℕ and the sums s_i + 1, s_i + 2
  appearing in the case construction; NAT-sub's conditional-closure clause at s_i ≥ 1 (T0's
  index domain) and #t ≥ 1 (T0) gives s_i − 1 and #t − 1 in ℕ for the sub-sequence upper
  indices and for the inequality s_k ≤ #t − 1. NAT-card's enumeration characterisation of
  |·| identifies the length k of the strictly increasing enumeration s₁ < s₂ < … < s_k
  of the zero-index subset with zeros(t), so k = zeros(t) in the case analysis on k.
  Well-definedness
  follows because T4's role-assignment makes zeros exactly the field separators and T0
  identifies each tᵢ as a function of t, so the scan result is determined by t.
  Outside the T4-valid subdomain (zeros(t) ≥ 4, or zeros(t) ≤ 3 with a violated
  field-segment constraint) this corollary assigns no value to fields(t); consumers must
  discharge T4-validity as a precondition.
