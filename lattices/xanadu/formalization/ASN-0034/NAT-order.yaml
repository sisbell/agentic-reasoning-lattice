label: NAT-order
name: NatStrictTotalOrder
type: axiom
depends: []
summary: |
  The natural numbers are strictly totally ordered by `<`: no number precedes itself (irreflexivity), the order is
  transitive, any two naturals are related by at least one of `<`, `=`, `>` (at-least-one trichotomy), and `<` is
  disjoint from `=` (the clause `m < n ⟹ m ≠ n`). The four axiom clauses together export *exactly-one trichotomy*
  as a Consequence: for any two naturals, exactly one of less-than, equality, or greater-than holds. The non-strict
  companion `≤` is defined from `<` directly, and the reverse companions `≥` and `>` are defined as the converses of
  `≤` and `<`; all three defined relations inherit the strict-total-order guarantees through their unfoldings.
