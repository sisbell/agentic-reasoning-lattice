label: Σ.M(d)
name: Arrangement
type: definition
vocabulary:
- symbol: Σ.M(d)
  meaning: The arrangement of document d; a partial function from V-position tumblers to I-address tumblers, mapping active
    V-positions to I-addresses in the content store
- symbol: dom(Σ.M(d))
  meaning: The set of V-positions currently active in document d; the domain of the arrangement function
- symbol: ran(Σ.M(d))
  meaning: The set of I-addresses that document d currently references; the range of the arrangement function
- symbol: Σ₀
  meaning: The initial system state before any operations have been applied; dom(Σ₀.C) = ∅ and dom(Σ₀.M(d)) = ∅ for every
    document d
