label: S8-crun
name: CorrespondenceRun
type: definition
vocabulary:
- symbol: v + 0 = v
  meaning: 'Identity case of ordinal displacement notation: adding zero displacement to a V-position returns it unchanged'
- symbol: v + k = shift(v, k)
  meaning: Ordinal displacement applied to a V-position for k ≥ 1; extends OrdinalShift notation to a unified +k form
- symbol: a + 0 = a
  meaning: Identity case of ordinal displacement notation for I-addresses
- symbol: a + k = shift(a, k)
  meaning: Ordinal displacement applied to an I-address for k ≥ 1; shifts the element ordinal component by k
- symbol: correspondence run
  meaning: A triple (v, a, n) — a V-position, an I-address, and n ≥ 1 — such that Σ.M(d)(v + k) = a + k for all 0 ≤ k < n
