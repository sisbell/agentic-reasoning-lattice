label: PartitionMonotonicity
name: PartitionMonotonicity
summary: Within any prefix-delimited partition of the address space, all allocated addresses are totally ordered by T1 consistently
  with per-allocator allocation order. For sibling sub-partitions with non-nesting prefixes p₁ < p₂, every address extending
  p₁ precedes every address extending p₂ — the prefix hierarchy imposes a global cross-allocator ordering on top of each allocator's
  local order.
