# Symbol-owners table for the xanadu lattice.
#
# Drives invariant #7 (declared-symbols-resolve) of the Claim File Contract:
# a claim that uses symbol S must either own S or have its owner in its
# transitive depends closure.
#
# Two sections:
#   primitives — always in scope, no owning claim required
#   owners     — symbol → label of the claim that introduces it
#
# Live document: grow the table as reviewer findings surface new symbols
# that should have been catchable mechanically. Keep entries high-confidence;
# false positives from the validator block landing.

# Universal logical and set-theoretic primitives.
# These appear everywhere and don't require a claim-level introduction.
primitives:
  - "="
  - "≠"
  - "∈"
  - "∉"
  - "⊆"
  - "⊇"
  - "⇒"
  - "⇔"
  - "∀"
  - "∃"
  - "∧"
  - "∨"
  - "¬"

# Symbols owned by specific claims in ASN-0034's foundation.
owners:
  "<":   NAT-order
  "≤":   NAT-order
  "≥":   NAT-order
  "0":   NAT-zero
  "1":   NAT-closure
  "+":   NAT-closure
  "−":   NAT-sub   # U+2212 MINUS SIGN, not U+002D hyphen
  "#·":  T0
  "|·|": NAT-card
  "⊕":   TumblerAdd
  "⊖":   TumblerSub
