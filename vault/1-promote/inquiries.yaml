# Inquiries — Abstract questions that drive ASN generation
#
# Each inquiry produces one independent ASN.
# Questions are framed abstractly to prevent implementation drift.
# New inquiries can be added from ASN open questions.
#
# agents.nelson — number of Nelson sub-questions (default: 10)
# agents.gregory — number of Gregory sub-questions (default: 10)
# Set either to 0 to skip that expert. Set to 1 for a focused follow-up.

inquiries:
  - id: 1
    title: "Tumbler Algebra"
    question: "What algebraic properties must the Xanadu addressing system satisfy? What ordering, arithmetic, and structural guarantees do tumblers provide?"
    area: addressing
    agents:
      nelson: 10
      gregory: 10

  - id: 2
    title: "Address Permanence"
    question: "What guarantees must the system provide about address stability? Once content is assigned an address, what operations may and may not affect that assignment?"
    area: addressing
    agents:
      nelson: 10
      gregory: 10

  - id: 3
    title: "I-Space and V-Space"
    question: "What is the relationship between permanent content storage (I-space) and mutable document arrangement (V-space)? What invariants connect them?"
    area: content-model

  - id: 4
    title: "Content Insertion"
    question: "What must INSERT preserve and establish? What are its preconditions, postconditions, and frame conditions with respect to the address space, existing content, and links?"
    area: operations

  - id: 5
    title: "Content Deletion"
    question: "What must DELETE preserve? What happens to addresses, links, and other documents that reference deleted content? In what sense is deletion reversible?"
    area: operations

  - id: 6
    title: "Transclusion (COPY)"
    question: "What must content sharing through transclusion guarantee? How does transclusion differ from duplication? What properties of the original are preserved in the copy?"
    area: operations

  - id: 7
    title: "Links and Endsets"
    question: "What must bidirectional links guarantee? What are endset semantics — how do links survive editing, deletion, and rearrangement of their target content?"
    area: links

  - id: 8
    title: "Link Discovery"
    question: "What guarantees must link discovery provide? If content A links to content B, under what conditions can B discover the link? What about transcluded content?"
    area: links

  - id: 9
    title: "Version Semantics"
    question: "What does creating a new version preserve and establish? What is the version fork model — how do versions relate to each other and to shared content?"
    area: versioning

  - id: 10
    title: "Content Retrieval"
    question: "What must RETRIEVE guarantee about returned content? How does retrieval interact with transclusion, versioning, and the two address spaces?"
    area: operations

  - id: 11
    title: "Document Lifecycle"
    question: "What invariants govern document creation, ownership, and the relationship between documents in the docuverse? What does it mean to open, close, and create documents?"
    area: documents

  - id: 12
    title: "Enfilade Properties"
    question: "What abstract properties must the indexing data structure satisfy? What guarantees about range queries, composable widths, and structural balance does the system require — independent of any particular tree implementation?"
    area: data-structures

  - id: 13
    title: "Concurrency and Global Indexes"
    question: "What consistency must the system guarantee when multiple users concurrently modify different documents that share I-space addresses? What coordination do the global indexes (span index, link index) require? How does single-writer ownership interact with shared-read global state?"
    area: concurrency
    source: "ASN-0012 open question: concurrent displacement algebra"

  - id: 14
    title: "Distributed Replication Consistency"
    question: "What must a multi-server Xanadu deployment guarantee about the convergence of replicated global state? How do the system's structural properties constrain the replication model?"
    area: concurrency
    source: "ASN-0013 open question: BEBE replication convergence guarantees for global indexes"
    agents:
      nelson: 10
      gregory: 5

  - id: 15
    title: "Permanence and Economic Obligations"
    question: "What must the system guarantee about its permanence invariants when economic obligations are not met — are address permanence, content immutability, and publication irrevocability unconditional or conditioned on continued payment?"
    area: economics
    source: "ASN triage"
    agents:
      nelson: 10
      gregory: 0

  - id: 16
    title: "Content Provenance"
    question: "What must the system guarantee about tracing the origin and path of content? Given content at a location, what can be determined about where it came from, how it arrived, and its relationship to the same content appearing elsewhere?"
    area: content-model
    source: "v8 EWD-029 gap analysis"
    agents:
      nelson: 10
      gregory: 10

  - id: 17
    title: "Rearrange Operation"
    question: "What must REARRANGE (reordering content within a document without insertion or deletion) preserve and establish? How does moving content differ from delete-then-insert, and what address, link, and provenance guarantees must hold across rearrangement?"
    area: operations
    source: "v8 EWD gap analysis"
    agents:
      nelson: 10
      gregory: 10

  - id: 18
    title: "Concurrent Operation Ordering"
    question: "What must the system guarantee about the result when multiple operations modify the same or overlapping content simultaneously? What determines the final state and what invariants must the resolution satisfy?"
    area: concurrency
    source: "review-defer triage"

  - id: 19
    title: "Operation Journaling"
    question: "What must the system guarantee about recording and replaying the history of operations performed on content? What properties must an operation log satisfy for faithful state reconstruction?"
    area: versioning
    source: "review-defer triage"
    agents:
      nelson: 10
      gregory: 5

  - id: 20
    title: "Allocation Order Invariants"
    question: "What must the system guarantee about the relationship between the temporal order in which content is allocated and its spatial position in V-space? Must allocation order correspond to document order?"
    area: addressing
    source: "review-defer triage"

  - id: 21
    title: "Frame Condition Completeness"
    question: "What must each operation explicitly guarantee about state it does not intend to modify? What frame conditions must hold across all operations to ensure unaffected properties — ownership, links, addresses — are preserved?"
    area: operations
    source: "review-defer triage"

  - id: 22
    title: "Ghost Link Discoverability"
    question: "What must the system guarantee about discovering links whose target content no longer appears in any document's V-space? How does link discoverability interact with content deletion?"
    area: links
    source: "review-defer triage"

  - id: 23
    title: "Deletion Economics"
    question: "What must the system guarantee about economic obligations — storage costs, royalty flows, ownership accounting — when content is deleted from V-space but persists in I-space?"
    area: economics
    source: "review-defer triage"
    agents:
      nelson: 10
      gregory: 0

  - id: 24
    title: "Operational Fragmentation Bounds"
    question: "What must the system guarantee about the growth of internal mapping entries as sequences of INSERT, DELETE, and COPY operations are applied? What bounds must hold on state representation size relative to content size?"
    area: data-structures
    source: "review-defer triage"

  - id: 25
    title: "Address Permanence"
    question: "What guarantees must the system provide about address stability? Once content is assigned an address, what operations may and may not affect that assignment?"
    area: addressing
    agents:
      nelson: 10
      gregory: 10

  - id: 26
    title: "I-Space and V-Space"
    question: "What is the relationship between permanent content storage (I-space) and mutable document arrangement (V-space)? What invariants connect them?"
    area: content-model

  - id: 27
    title: "Address Permanence"
    question: "What guarantees must the system provide about address stability? Once content is assigned an address, what operations may and may not affect that assignment?"
    area: addressing

