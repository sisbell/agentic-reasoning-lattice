# ASN-0043 — Link Ontology
title: "Link Ontology"
depends: [34, 36]
out_of_scope: "Operations and their effects (MAKELINK, FOLLOWLINK, REMOVELINK, INSERT, DELETE, COPY, REARRANGE, CREATENEWVERSION), survivability as a case analysis over operations, V-space effects of editing (fragmentation, visibility changes), resolution and partial resolution (I-to-V conversion, document-relative following), POOM structure and V-stream mechanics, span index and indexing implementation, scale-independence and performance guarantees, sieving and filtering of discovery results, publication and access control policy (who may link, suppression of incoming links), version creation and version-spanning discovery (consequence of address sharing not link property), three-layer deletion model (identity/index/presentation), document lifecycle and document ontology, economic obligations (royalties, storage costs), enfilade implementation internals, replication and inter-server protocol (BEBE)"

inquiry:
  question: "What is a link on the tumbler line? What structure must a connection between arbitrary spans of tumbler addresses have, and what properties must hold about those connections?"

modeling:
  proof_imports: [TumblerAlgebra, TumblerOrder, TumblerHierarchy, TumblerAllocation]
