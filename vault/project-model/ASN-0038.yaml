# ASN-0038 — Tumbler Baptism
title: "Tumbler Baptism"
depends: [34]
excludes: [35, 36, 37]
out_of_scope: "Node-specific tree structure, account identity and lifecycle, document creation and structure, content storage and retrieval, I-space and V-space, operation-specific effects (INSERT, DELETE, COPY, REARRANGE), authorization and ownership, links and endsets, enfilade implementation internals, replication and inter-server protocol (BEBE)"

inquiry:
  question: "What does it mean to baptize a new position in the tumbler hierarchy? What invariants govern the set of baptized positions across all levels?"
