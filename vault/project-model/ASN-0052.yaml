# ASN-0052 — Transclusion
title: "Transclusion"
depends: [34, 36, 43, 45, 47]

inquiry:
  question: "What does it mean for the same content to appear in multiple documents? What is shared, what is independent, and what guarantees hold permanently across the connection?"

modeling:
  proof_imports: [TumblerAlgebra, TumblerOrder, TumblerHierarchy, TumblerAllocation, TwoSpace, StateTransitions, LinkOntology]
