# ASN-0053 — Span Algebra
title: "Span Algebra"
depends: [34, 55]
out_of_scope: "Operations and their effects on spans (INSERT, DELETE, COPY, REARRANGE), arrangement structure (correspondence runs, V-contiguity, run decomposition, run counts), document and version semantics, link endsets and discovery, content store and I-space/V-space distinction, publication and access control, enfilade implementation internals"

inquiry:
