# ASN-0037 — Tumbler Authorization
title: "Tumbler Authorization"
depends: [34]
excludes: [35, 36]
out_of_scope: "Account identity and lifecycle, document creation and structure, content storage and retrieval, I-space and V-space, operation-specific effects (INSERT, DELETE, COPY, REARRANGE), links and endsets, enfilade implementation internals, replication and inter-server protocol (BEBE), concrete authentication mechanisms (certificates, keys, tokens)"

inquiry:
  question: "What abstract authorization model governs baptism beneath a tumbler prefix? How is authority established, propagated, and constrained across the hierarchy?"
