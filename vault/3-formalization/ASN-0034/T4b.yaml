label: T4b
name: UniqueParse
type: corollary
depends:
- T3
- T4
- T4a
summary: Because T4's role assignment makes zeros exactly the field separators — and T0's carrier ℕ ensures no other value
  can play that role — the decomposition function fields(t) is uniquely recoverable by a single scan of the component sequence.
  T3's canonical representation ensures there is no alternative encoding that could yield a different scan result.
