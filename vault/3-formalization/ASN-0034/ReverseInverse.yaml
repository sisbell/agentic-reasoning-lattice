label: ReverseInverse
name: ReverseInverse
type: corollary
depends:
- T1
- T3
- TA3-strict
- TA4
- TA-Pos
- ActionPoint
- TumblerAdd
- TumblerSub
- NAT-sub
- NAT-order
- NAT-addcompat
- NAT-closure
- NAT-cancel
summary: Under the conditions that a and w share the same length k, a ≥ w, w is positive, and a has all-zero components before
  w's action point, subtracting w from a and then adding w back recovers a exactly. This establishes that tumbler subtraction
  and addition are mutually inverse within this constrained setting.
