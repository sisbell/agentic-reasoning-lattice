label: T0
name: CarrierSetDefinition
type: axiom
depends: []
summary: |
  Establishes the carrier set T as all finite sequences of natural numbers with at least one component, equipped
  with length #· and component projection ·ᵢ. Standard properties of ℕ are stated as separate axioms (NAT-closure,
  NAT-order, NAT-discrete, NAT-addcompat, NAT-wellorder).
