label: T10a.2
name: NonNestingSiblingPrefixes
type: corollary
depends:
- Prefix
- T10a.1
- T1
- TA5
- T10
summary: 'Distinct siblings from the same allocator are prefix-incomparable — neither address is a prefix of the other. This
  follows from their equal length (T10a.1) combined with Prefix: equal-length tumblers are prefix-related only if identical,
  so a proper prefix relation between equal-length siblings is impossible. The cross-allocator extension is T10a.5.'
