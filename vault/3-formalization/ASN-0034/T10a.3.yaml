label: T10a.3
name: LengthSeparation
type: corollary
depends:
- T10a.1
- T3
- TA5
summary: Child allocator outputs are strictly longer than any parent sibling output, with the length gap accumulating additively
  across nesting levels. A descendant at depth d has output length exactly γ + k'₁ + … + k'_d (each k'ᵢ ∈ {1, 2}), so outputs
  at different nesting depths are always length-distinct and therefore never collide.
