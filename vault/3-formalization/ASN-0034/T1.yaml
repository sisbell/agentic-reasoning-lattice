label: T1
name: LexicographicOrder
type: definition
depends:
- T0
- T3
summary: 'Tumblers are totally ordered lexicographically: compare component by component, and if one tumbler is a proper prefix
  of the other, the shorter one comes first. This total order is architecturally necessary because spans are defined as contiguous
  intervals on the tumbler line — incomparable addresses would make span endpoints undefined.'
