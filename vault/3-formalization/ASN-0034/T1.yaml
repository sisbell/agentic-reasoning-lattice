label: T1
name: LexicographicOrder
type: definition
depends:
- T0
- T3
- NAT-order
- NAT-wellorder
summary: 'Defines a strict total order on T by lexicographic comparison: two tumblers are compared component-by-component
  left to right, with the first disagreement deciding the outcome, and a shorter tumbler preceding any proper extension of
  itself. The order is irreflexive, satisfies trichotomy, and is transitive — making any two tumblers comparable and giving
  the "tumbler line" its linear structure on which spans, link endsets, and content reference all depend.'
