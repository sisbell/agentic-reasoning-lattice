label: TA-Pos
name: PositiveTumbler
type: definition
depends:
- T0
- T3
- T1
- NAT-order
- NAT-zero
- NAT-discrete
- NAT-wellorder
summary: 'Defines positivity for tumblers: a tumbler is positive if at least one component is nonzero, and a zero tumbler
  has all components equal to zero. Every positive tumbler is strictly greater under T1 than every zero tumbler of any length,
  regardless of their respective lengths.'
