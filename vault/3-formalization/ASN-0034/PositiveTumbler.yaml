label: PositiveTumbler
name: PositiveTumbler
type: definition
depends:
- T1
- T3
- TA0
summary: A tumbler is positive if it contains at least one nonzero component; a tumbler is a zero tumbler if all components
  are zero. Every positive tumbler is strictly greater under T1 than every zero tumbler of any length, establishing a clean
  separation between the all-zero tumblers (which form an ascending chain by length) and the rest of the address space.
