label: TA-Pos
name: PositiveTumbler
type: definition
depends:
- T0
summary: |
  Defines positivity for tumblers: a tumbler is positive if at least one component is nonzero, and a zero tumbler
  has all components equal to zero. The ordering consequence — every positive tumbler is strictly greater under T1
  than every zero tumbler of any length — is established separately as TA-PosDom (PositiveDominatesZero), which
  consumes ActionPoint and therefore sits downstream of both TA-Pos and ActionPoint.
