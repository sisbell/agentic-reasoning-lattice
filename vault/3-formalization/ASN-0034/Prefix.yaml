label: Prefix
name: PrefixRelation
type: definition
depends:
- T0
- T3
- NAT-order
summary: 'Defines the prefix relation p ≼ q: p''s length does not exceed q''s and every component of p matches the corresponding
  component of q. A proper prefix p ≺ q additionally requires p ≠ q, which forces #p < #q strictly — equal-length agreement
  would make the tumblers identical by T3.'
