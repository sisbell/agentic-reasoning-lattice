label: TA5-SIG
name: LastSignificantPosition
type: definition
depends: []
summary: 'Defines sig(t) as the index of the rightmost nonzero component of tumbler t; for an all-zero tumbler, sig(t) = #t
  by convention. The result always satisfies 1 ≤ sig(t) ≤ #t, giving a well-defined handle on where a tumbler''s significant
  content ends.'
