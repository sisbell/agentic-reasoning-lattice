label: TA3
name: OrderPreservationUnderSubtractionWeak
type: corollary
depends:
- TA2
- T1
- T3
- TA6
- TumblerSub
summary: 'A weak form of order preservation under subtraction: if a < b and both dominate w, then a ⊖ w ≤ b ⊖ w, with no equal-length
  requirement. This relaxes TA3-strict by allowing the result to collapse to equality when lengths differ.'
