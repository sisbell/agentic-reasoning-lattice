label: T6
name: DecidableContainment
type: corollary
depends:
- T4
- T0
summary: Containment queries (same server? same account? same document? one address a prefix of another?) can be decided by
  extracting and comparing the relevant field sequences from the two tumbler representations alone, with no external index
  or registry. The decidability is a direct corollary of T4's structural constraints; it is stated separately because it is
  load-bearing for decentralized operation.
