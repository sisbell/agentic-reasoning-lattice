label: ActionPoint
name: ActionPoint
type: definition
depends:
- T0
- TA-Pos
- NAT-order
- NAT-zero
- NAT-discrete
- NAT-wellorder
summary: Defines the action point of a positive tumbler as the index of its first nonzero component. Because the tumbler is
  positive, at least one nonzero component exists, so the minimum is always well-defined and falls within the tumbler's length.
