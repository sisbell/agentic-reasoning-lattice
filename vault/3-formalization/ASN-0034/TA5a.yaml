label: TA5a
name: IncrementPreservesT4
type: corollary
depends:
- TA5
- TA5-SigValid
- T4
summary: The increment operation inc(t, k) produces a valid address (satisfying T4) if and only if k = 0, or k = 1 with at
  most three existing zero components, or k = 2 with at most two existing zero components; for k ≥ 3 the result always violates
  T4 because the appended separator zeros create an adjacent-zero or empty-field violation. This gives the precise depth limit
  for child allocation from any given valid address.
