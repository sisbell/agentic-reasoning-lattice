label: TA5a
name: IncrementPreservesT4
type: corollary
depends:
- TA5
- TA5-SigValid
- T4
- T4a
- T0
- NAT-zero
- NAT-discrete
- NAT-closure
- NAT-addcompat
- NAT-sub
summary: The increment operation inc(t, k) produces a valid address (satisfying T4) if and only if k ∈ {0, 1}, or k = 2 with
  at most two existing zero components; for k ≥ 3 the result always violates T4 because the appended separator zeros create
  an adjacent-zero or empty-field violation. The k = 1 branch carries no extra zero-count side condition beyond T4-validity
  of t, since inc(·, 1) is zero-separator-neutral. This gives the precise depth limit for child allocation from any given
  valid address.
