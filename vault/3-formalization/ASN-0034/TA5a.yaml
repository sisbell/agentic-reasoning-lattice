label: TA5a
name: IncrementPreservesT4
type: corollary
depends:
- TA5
- TA5-SigValid
- T4
summary: 'The allocation increment inc(t, k) preserves T4 validity if and only if no new empty field (adjacent zeros) is introduced:
  k = 0 always preserves validity, k = 1 preserves it when the address already has at most 3 zero separators, k = 2 preserves
  it only when zeros(t) ≤ 2, and k ≥ 3 always violates T4 by creating an empty field.'
