label: T4c
name: LevelDetermination
type: corollary
depends:
- T4
- T4b
summary: 'The count of zero-valued components in a valid tumbler is a bijection onto hierarchical level: zero zeros means
  node address, one means user, two means document, three means element. This follows because every zero is a separator (T4b),
  so the zero count equals the separator count, and the number of fields present is always the separator count plus one.'
