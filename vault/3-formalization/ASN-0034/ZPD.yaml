label: ZPD
name: ZeroPaddedDivergence
type: definition
depends:
- T0
- Divergence
- NAT-order
- NAT-wellorder
summary: Defines `zpd(a, w)` as the index of the first position where two tumblers disagree after both are zero-padded to
  the same length. The function is partial — undefined when the padded sequences agree everywhere, a condition that arises
  not only when `a = w` but also when one tumbler is a zero-trailing prefix of the other.
