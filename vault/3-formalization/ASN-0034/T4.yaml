label: T4
name: HierarchicalParsing
type: axiom
depends: []
summary: 'Valid tumblers encode a four-level containment hierarchy (node, user, document, element) using zero-valued components
  as field separators. The axiom constrains separator placement: at most three zeros, none adjacent, and neither the first
  nor last component may be zero — guaranteeing every field segment is non-empty.'
