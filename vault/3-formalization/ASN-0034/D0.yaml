label: D0
name: DisplacementWellDefined
type: corollary
depends:
- T1
- T3
- Divergence
- ZPD
- TA-Pos
- ActionPoint
- TA0
- TA2
- TumblerAdd
- TumblerSub
- NAT-sub
- NAT-order
- NAT-closure
- NAT-addcompat
summary: Establishes that when a < b and the divergence point does not exceed a's length, the displacement b ⊖ a is a well-defined
  positive tumbler whose action point equals the divergence index. The round-trip a ⊕ (b ⊖ a) recovers b exactly when a is
  no longer than b; if a is strictly longer than b, the round-trip is guaranteed to fail.
