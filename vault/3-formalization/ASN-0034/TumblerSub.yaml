summary: 'Defines tumbler subtraction `a ⊖ w` as the component-wise difference computed at the first point of zero-padded
  divergence: components before that point become zero, the divergence point is subtracted, and deeper components are copied
  from the minuend. The roundtrip `a ⊕ (b ⊖ a) = b` requires two independently necessary conditions — that the divergence
  point falls within `a`''s length and that `a` is no longer than `b` — explaining why TumblerSub''s domain is strictly narrower
  than the ordering `a ≥ w` alone would suggest.'
