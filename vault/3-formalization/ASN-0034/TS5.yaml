label: TS5
name: ShiftAmountMonotonicity
type: corollary
depends:
- TS3
- TS4
- OrdinalShift
- NAT-sub
- NAT-order
- T0
summary: 'Larger shift amounts produce strictly larger results on the same tumbler: if n₂ > n₁ ≥ 1, then shift(v, n₂) > shift(v,
  n₁). The output of shift is strictly monotone in the shift amount.'
