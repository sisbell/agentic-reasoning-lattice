label: NAT-addassoc
name: NatAdditionAssociative
type: axiom
depends: []
summary: |
  Addition on ℕ is associative: `(m + n) + p = m + (n + p)` for every `m, n, p ∈ ℕ`.
  Stated as an axiom alongside the other NAT-* facts so downstream proofs can cite it
  directly without appealing to an implicit "standard properties of ℕ" clause.
