label: T10
name: PartitionIndependence
type: theorem
depends:
- T0
- T3
- Prefix
summary: 'If two tumblers p₁ and p₂ are non-nested (neither is a prefix of the other), then any address descended from p₁
  and any address descended from p₂ are guaranteed to be distinct. This is the formal basis for coordination-free allocation:
  owners of disjoint subtrees can allocate addresses independently with no risk of collision.'
