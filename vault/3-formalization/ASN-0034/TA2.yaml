label: TA2
name: WellDefinedSubtraction
type: corollary
depends:
- TumblerSub
- T0
- T1
- T3
- NAT-order
- NAT-sub
summary: 'Tumbler subtraction a ⊖ w is well-defined whenever a ≥ w, producing a valid tumbler whose length is max(#a, #w).
  The result lies in T and correctly represents the displacement needed to reach a from w.'
