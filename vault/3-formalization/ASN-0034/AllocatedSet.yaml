label: AllocatedSet
name: AllocatedSet
type: definition
depends:
  - T9
  - T10a
summary: |
  Defines allocated(s) — the set of addresses allocated at state s — as the union of realized allocator domains
  across all allocators activated in s. Bridges T10a's allocator mechanism and per-allocator domains to the
  state-indexed formulation used by T8 and NoDeallocation, and establishes the explicit embedding domₛ(A) ⊆ dom(A)
  as an initial segment with enumeration indices preserved, with dom(A) = ⋃{domₛ(A) : s reachable} as the limit,
  so properties proven over dom(A) (notably T9's forward-ordering) transfer to realized allocations.
