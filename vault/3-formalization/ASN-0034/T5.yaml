label: T5
name: ContiguousSubtrees
type: definition
depends:
- Prefix
- T1
- T3
summary: If two addresses share a common prefix and a third address falls between them in the total lexicographic order, that
  third address must also share the prefix. This means every subtree maps to a contiguous interval on the tumbler line, so
  span endpoints alone implicitly determine all addresses in between — no addresses from unrelated subtrees can interleave.
