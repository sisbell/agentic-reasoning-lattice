label: T7
name: SubspaceDisjointness
type: corollary
depends:
- T3
- T4
- T4b
- T0
summary: For two T4-valid element-level addresses (tumblers satisfying the T4 constraints with exactly three zero delimiters),
  differing in the first element-field component places them in distinct subspaces — text (1) and links (2) cannot share
  an address. T4-validity is required so that T4b licenses the component-access notation `a.E₁`, `b.E₁` used in the statement;
  without it the predicate is ill-formed. This structural separation guarantees that arithmetic within one subspace never
  produces addresses belonging to another.
