label: T10a.5
name: CrossAllocatorIncomparability
type: corollary
depends:
  - T10a
  - T10a.1
  - T10a.3
  - T10a.4
  - TA5
  - TA5-SigValid
  - T3
  - Prefix
summary: For any two allocators not in an ancestor-descendant relationship, every output of one is prefix-incomparable
  with every output of the other. The proof identifies the branching point in the allocator tree and shows — via positional
  inheritance through the tree, the at-most-once child-spawning constraint, and the divergence of sibling outputs — that
  outputs of non-ancestor-related allocators disagree at a fixed position within their common range, excluding any prefix
  relationship. Together with T10a.2, this establishes the full precondition of T10 across the entire allocator tree.
