label: PartitionMonotonicity
name: PartitionMonotonicity
type: theorem
depends:
- Prefix
- PrefixOrderingExtension
- T1
- T3
- T5
- T9
- T10a
- T10a.1
- T10a.4
- TA5
summary: Within any prefix-delimited partition, all allocated addresses are totally ordered by T1 in a way that is consistent
  with each allocator's local allocation order. Additionally, for any two sibling sub-partitions whose prefixes are ordered
  p₁ < p₂, every address under p₁ precedes every address under p₂ — so the prefix structure alone determines the cross-allocator
  ordering.
