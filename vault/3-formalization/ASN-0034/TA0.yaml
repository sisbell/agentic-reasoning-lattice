label: TA0
name: WellDefinedAddition
type: theorem
depends:
- T0
- TA-Pos
- ActionPoint
- TumblerAdd
summary: Adding a positive displacement w to a position a yields a valid tumbler, provided w's action point does not exceed
  a's length. The action-point constraint ensures the piecewise construction can actually access position k within a; without
  it, the operation is undefined. The result inherits its length from w, not from a.
