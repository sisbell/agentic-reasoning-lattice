vocabulary:
- symbol: valid insertion position
  meaning: Given depth m ≥ 2, a V-position v in subspace S of document d satisfying D-CTG, where either V_S(d) is non-empty with m equal to the common depth and either v = min(V_S(d)) or v = shift(min(V_S(d)), j) for some 1 ≤ j ≤ N (via OrdinalShift), or V_S(d) is empty and v = [S, 1, ..., 1] of depth m
